<main class="new-password-shell">
  <section class="new-password-card">

    <span class="badge">Nueva contraseña</span>

    <h1>Crear nueva contraseña</h1>

    <p class="description">
      Tu nueva contraseña debe ser segura y diferente a las anteriores.
    </p>

    <form (ngSubmit)="guardarPassword()">

      <label class="field">
        <span>Nueva contraseña</span>

        <div class="input-with-toggle">
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Ingresa tu nueva contraseña"
            [(ngModel)]="password"
            name="password"
            minlength="8"
            required
          />

          <button
            type="button"
            class="eye-toggle"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <i [class]="showPassword ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill'" aria-hidden="true"></i>
          </button>
        </div>
      </label>

      <label class="field">
        <span>Confirmar contraseña</span>

        <div class="input-with-toggle">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            placeholder="Confirma tu contraseña"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            minlength="8"
            required
          />

          <button
            type="button"
            class="eye-toggle"
            (click)="showConfirmPassword = !showConfirmPassword"
            [attr.aria-label]="showConfirmPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <i [class]="showConfirmPassword ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill'" aria-hidden="true"></i>
          </button>
        </div>
      </label>

      @if (confirmPassword && !passwordsMatch) {
        <p class="feedback-error">Las contraseñas no coinciden.</p>
      }

      @if (formError) {
        <p class="feedback-error">{{ formError }}</p>
      }

      <button type="submit" class="primary-button" [disabled]="!canSubmit">
        Guardar contraseña
      </button>

    </form>

    <a routerLink="/login" class="back-link">
      ← Volver al inicio
    </a>

  </section>
</main>
