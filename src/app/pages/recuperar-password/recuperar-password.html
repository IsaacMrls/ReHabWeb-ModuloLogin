<main class="recovery-shell">
  <section class="recovery-card">

    <span class="badge">Recuperación de acceso</span>

    <h1>¿Olvidó su contraseña?</h1>

    <p class="description">
      Ingresa el correo usado en el registro de su cuenta.
    </p>

    <form (ngSubmit)="enviarCodigo()">

      <label class="field">
        <span>Correo electrónico</span>

       <input
          type="email"
          placeholder="doctor@rehabweb.com"
          [(ngModel)]="email"
          name="email"
        />
      </label>

      <button type="submit" class="primary-button">
        Enviar código
      </button>

    </form>

    <a routerLink="/login" class="back-link">
      ← Volver al inicio de sesión
    </a>

  </section>
</main>
